version: '3.9'

services:
  bff-api:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      JWT_SECRET: change-this-in-production
      JWT_EXPIRES_IN: 1h
      CORS_ORIGIN: http://localhost:4200
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
